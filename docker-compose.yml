# Produkcja na Hostinger VPS – pliki wbudowane w obraz
# Lokalnie: utwórz .env z GUS_BIR1_KEY=twój_klucz
services:
  nipchecker:
    build:
      context: ./docker/nipchecker
      dockerfile: Dockerfile
      no_cache: true
    restart: always
    environment:
      - GUS_BIR1_KEY=${GUS_BIR1_KEY}
      - GUS_BIR1_USE_TEST=false
    labels:
      - traefik.enable=true
      - traefik.http.routers.nipchecker.rule=Host(`nip.aikuznia.cloud`)
      - traefik.http.routers.nipchecker.entrypoints=websecure
      - traefik.http.routers.nipchecker.tls=true
      - traefik.http.routers.nipchecker.tls.certresolver=mytlschallenge
      - traefik.http.services.nipchecker.loadbalancer.server.port=80
      - traefik.docker.network=root_default
    networks:
      - root_default

networks:
  root_default:
    external: true
